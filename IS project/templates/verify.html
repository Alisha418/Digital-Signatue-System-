<!DOCTYPE html>
<html>
<head>
    <title>Verify Signature</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea {
            resize: vertical;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            font-weight: bold;
            margin-top: 20px;
            color: #006600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verify Digital Signature</h2>
        <form method="POST" enctype="multipart/form-data">
            <label for="document">Upload Document:</label>
            <input type="file" name="document" required>

            <label for="r">Signature R Value:</label>
            <input type="text" name="r" placeholder="Enter R" required>

            <label for="s">Signature S Value:</label>
            <input type="text" name="s" placeholder="Enter S" required>

            <label for="public_key">Public Key (PEM format):</label>
            <textarea name="public_key" rows="6" placeholder="Paste public key here..." required></textarea>

            <input type="submit" value="Verify Signature">
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
